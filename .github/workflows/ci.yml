name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Media smoke test
        run: npm run smoke:media

      - name: Build Docker image
        run: docker build -t machine-tube-node:ci .
